[window]
padding = { x = 10, y = 10 }
dynamic_padding = true
opacity = 1.0
startup_mode = "Maximized"
title = "Alacritty | AI Workspace"

[terminal.shell]
program = "zsh"
# Додаємо команду переходу в домашню директорію ($HOME)
#args = ["-NoLogo", "-NoExit", "-Command", "Set-Location $HOME"]

[font]
normal = { family = "JetBrains Mono", style = "Regular" }
bold = { family = "JetBrains Mono", style = "Bold" }
italic = { family = "JetBrains Mono", style = "Italic" }
size = 10.0

[cursor]
style = { shape = "Beam", blinking = "Always" }
blink_interval = 500

[selection]
save_to_clipboard = true

# --- ГОРЯЧІ КЛАВІШІ ---
[[keyboard.bindings]]
key = "N"
mods = "Alt"
action = "CreateNewWindow"

[[keyboard.bindings]]
key = "V"
mods = "Control|Shift"
action = "Paste"

[[keyboard.bindings]]
key = "C"
mods = "Control|Shift"
action = "Copy"

[[keyboard.bindings]]
key = "Equals"
mods = "Control"
action = "IncreaseFontSize"

[[keyboard.bindings]]
key = "Minus"
mods = "Control"
action = "DecreaseFontSize"

[[keyboard.bindings]]
key = "Key0"
mods = "Control"
action = "ResetFontSize"

# --- ТЕМА: GRUVBOX DARK HARD ---
[colors.primary]
background = "#1d2021"
foreground = "#ebdbb2"

[colors.normal]
black =   "#282828"
red =     "#cc241d"
green =   "#98971a"
yellow =  "#d79921"
blue =    "#458588"
magenta = "#b16286"
cyan =    "#689d6a"
white =   "#a89984"

[colors.bright]
black =   "#928374"
red =     "#fb4934"
green =   "#b8bb26"
yellow =  "#fabd2f"
blue =    "#83a598"
magenta = "#d3869b"
cyan =    "#8ec07c"
white =   "#ebdbb2"

[colors.selection]
background = "#665c54"
text = "CellForeground"
